<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🌸 Floristería Online 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Fuente tipo globo y estilo general */
        body {
            font-family: 'Baloo 2', cursive;
            background-color: #ffe4e1; /* Rosa pastel suave */
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* Menú de navegación */
        nav {
            background-color: #ffb6c1;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 700;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #fff0f5;
        }

        /* Encabezado principal */
        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-size: 60px;
            color: #ff69b4;
            margin-bottom: 10px;
        }

        header p {
            font-size: 22px;
            color: #c71585;
            margin-bottom: 30px;
        }

        /* Eslogan con imagen visible al cargar */
        .eslogan {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fff0f5;
            padding: 25px;
            border-radius: 20px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .eslogan img {
            width: 250px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .eslogan-text {
            font-size: 26px;
            font-weight: 700;
            color: #ff1493;
        }

        /* Responsividad */
        @media (max-width: 600px) {
            nav a {
                display: block;
                margin: 10px 0;
            }

            header h1 {
                font-size: 40px;
            }

            .eslogan img {
                width: 180px;
            }

            .eslogan-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="Nosotros.html">Nosotros</a>
        <a href="Servicio.html">Servicio</a>
        <a href="Contacto.html">Contacto</a>
        <a href="Galeria.html">Galería</a>
	<a href="Calculos.html">Calculos</a>
    </nav>

    <header>
        <h1>🌸 Bienvenido a Floristería Online 🌸</h1>
        <p>💐 Flores frescas y hermosas para alegrar cualquier momento de tu vida 💐</p>

        <div class="eslogan">
            <img src="C:\Users\Participante\Downloads\tuli.jpg" alt="Ramo de flores">
            <div class="eslogan-text">"🌷 Llena tu vida de color y aromas, ¡una flor a la vez! 🌷"</div>
        </div>
    </header>

</body>
</html>
